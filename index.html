    <!-- Redirect Script -->
    <script type="text/javascript">
        // Deteksi jika diakses oleh user biasa (bukan crawler)
        const destination = "https://s.shopee.co.id/4VbBN7YnAG";
        
        // Cek user agent untuk crawler
        const userAgent = navigator.userAgent.toLowerCase();
        const crawlers = [
            'facebookexternalhit',
            'facebot',
            'twitterbot',
            'linkedinbot',
            'pinterestbot',
            'slackbot',
            'telegrambot'
        ];
        
        const isCrawler = crawlers.some(crawler => userAgent.includes(crawler));
        
        if (!isCrawler) {
            // Pengalihan instan
            window.location.replace(destination);
        }
    </script>
